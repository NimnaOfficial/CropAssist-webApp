# ===============================================================
# CROP SERVICE - Application Configuration
# ===============================================================

# --- Server Configuration ---
server.port=8082
server.servlet.context-path=/cropmgr_app
spring.application.name=crop-service

# --- Database Configuration (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/cropmgr_crops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HikariCP Connection Pool (Enterprise Tuning) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=CropServiceHikariPool

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Actuator (Health & Monitoring Endpoints) ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
