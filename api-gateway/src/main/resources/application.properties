server.port=8080

spring.application.name=api-gateway

# Route frontend requests for user operations to the user-service.
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/cropmgr_app/Api/users,/cropmgr_app/Api/users/**,/cropmgr_app/Api/login,/cropmgr_app/Api/login/**

# Route crop-related requests to the crop-service.
spring.cloud.gateway.routes[1].id=crop-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/cropmgr_app/api/crops,/cropmgr_app/api/crops/**

# Route communication requests to the comms-service.
spring.cloud.gateway.routes[2].id=comms-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/cropmgr_app/api/comms,/cropmgr_app/api/comms/**

# Route email requests to the mail-service.
spring.cloud.gateway.routes[3].id=mail-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/cropmgr_app/api/mail,/cropmgr_app/api/mail/**